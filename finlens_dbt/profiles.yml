finlens:
  target: dev
  outputs:
    dev:
      type: bigquery
      method: oauth                          # local dev — gcloud auth application-default login
      project: "{{ env_var('GCP_PROJECT') }}"
      dataset: finlens_dev
      location: US
      threads: 4
      timeout_seconds: 300
      priority: interactive

    prod:
      type: bigquery
      method: oauth                          # Cloud Run — uses Workload Identity (attached SA)
      project: "{{ env_var('GCP_PROJECT') }}"
      dataset: finlens_prod
      location: US
      threads: 8
      timeout_seconds: 600
      priority: batch
